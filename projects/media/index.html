        // ─── Grid constants ───────────────────────────────────────────────────────
        const GRID_COLS = 20, GRID_ROWS = 50;
        const CHAR_W = 5, CHAR_H = 7;
        const SLOT_W = 6; // 5 px + 1 spacing
        const SLOT_H = 8; // 7 px + 1 spacing

        // Active regions for each facade within the shared 20×50 grid.
        // Columns: 0 = left edge of active region; Rows: 0 = bottom of building.
        // Text renders top-down, so rowMax is the "top" of each facade's active area.
        // flipCols: true reverses column direction so text reads left→right when viewed from outside.
        // If text still appears mirrored on a facade after this fix, set its flipCols to false.
        const FACADES = [
            { name: 'East',  colMin: 0, colMax: 13, rowMin: 8,  rowMax: 49, flipCols: true  }, // 14 × 42
            { name: 'North', colMin: 0, colMax: 19, rowMin: 8,  rowMax: 49, flipCols: true  }, // 20 × 42
            { name: 'West',  colMin: 0, colMax: 19, rowMin: 0,  rowMax: 41, flipCols: false }, // 20 × 42
            { name: 'South', colMin: 0, colMax: 13, rowMin: 0,  rowMax: 41, flipCols: false }, // 14 × 42
        ];

        // ─── Text layout ──────────────────────────────────────────────────────────
        // Text flows as a single continuous row across all 4 facades (East→North→West→South),
        // then wraps to the next row down — same as a ticker tape around the building.
        //
        // All facades share the same vertical start row so text sits at the same height
        // on every face. Row 41 (0-indexed from bottom) is the top of West/South's
        // active area and comfortably inside East/North's range.
        const TEXT_START_ROW = 41;

        // How many full character rows fit above rowMin for the most constrained facade
        // (East/North, rowMin=8): floor((41−8+1) / 8) = 4 rows.
        const CHAR_ROWS = Math.min(...FACADES.map(f =>
            Math.floor((TEXT_START_ROW - f.rowMin + 1) / SLOT_H)
        ));

        // Sequential column map: COL_MAP[n] → which facade and local char-column that slot is.
        // Order: East (2 slots) → North (3 slots) → West (3 slots) → South (2 slots) = 10/row.
        const COL_MAP = [];
        for (let fi = 0; fi < FACADES.length; fi++) {
            const f = FACADES[fi];
            const charsWide = Math.floor((f.colMax - f.colMin + 1) / SLOT_W);
            for (let cc = 0; cc < charsWide; cc++) {
                COL_MAP.push({ facadeIdx: fi, localCol: cc });
            }
        }
        const CHARS_PER_ROW = COL_MAP.length; // 10
        const MAX_CHARS = CHARS_PER_ROW * CHAR_ROWS; // 10 × 4 = 40

        // gridCells[facadeIdx][gridRow][gridCol] = THREE.Mesh | null
        const gridCells = Array.from({ length: 4 }, () =>
            Array.from({ length: GRID_ROWS }, () => new Array(GRID_COLS).fill(null))
        );

        // ─── Grid helpers ─────────────────────────────────────────────────────────
        function clusterCenters(values, k) {
            if (k <= 1) return [values.reduce((a, b) => a + b, 0) / values.length];
            const min = Math.min(...values), max = Math.max(...values);
            // Initialise k evenly-spaced centers
            let centers = Array.from({ length: k }, (_, i) => min + (i / (k - 1)) * (max - min));
            // Refine with 6 k-means iterations
            for (let iter = 0; iter < 6; iter++) {
                const sums = new Array(k).fill(0);
                const counts = new Array(k).fill(0);
                for (const v of values) {
                    const idx = findNearest(centers, v);
                    sums[idx] += v;
                    counts[idx]++;
                }
                for (let i = 0; i < k; i++) {
                    if (counts[i] > 0) centers[i] = sums[i] / counts[i];
                }
            }
            return centers.sort((a, b) => a - b);
        }

        function findNearest(arr, val) {
            let best = 0, bestDist = Infinity;
            for (let i = 0; i < arr.length; i++) {
                const d = Math.abs(arr[i] - val);
                if (d < bestDist) { bestDist = d; best = i; }
            }
            return best;
        }

        function buildFacadeGrid(facadeIdx, sceneRoot) {
            const f = FACADES[facadeIdx];
            const numCols = f.colMax - f.colMin + 1;
            const numRows = f.rowMax - f.rowMin + 1;

            // Force world-matrix computation on the entire subtree
            sceneRoot.updateWorldMatrix(true, true);

            // Collect all leaf meshes and their world-space bounding-box centres
            const items = [];
            sceneRoot.traverse(child => {
                if (!child.isMesh) return;
                child.geometry.computeBoundingBox();
                const center = new THREE.Vector3();
                child.geometry.boundingBox.getCenter(center);
                center.applyMatrix4(child.matrixWorld);
                items.push({ mesh: child, center });
            });

            if (items.length === 0) return;

            // Determine the column axis: whichever of X / Z has more positional variance.
            // Y is always the row (height) axis.
            const variance = ax => {
                const vals = items.map(it => it.center[ax]);
                const mean = vals.reduce((a, b) => a + b, 0) / vals.length;
                return vals.reduce((s, v) => s + (v - mean) ** 2, 0) / vals.length;
            };
            const vx = variance('x'), vy = variance('y'), vz = variance('z');
            const colAxis = vx >= vz ? 'x' : 'z';

            console.log(`%cFacade ${f.name}: ${items.length} meshes | colAxis=${colAxis}`, 'color:cyan');

            const rowVals = items.map(it => it.center.y);
            const colVals = items.map(it => it.center[colAxis]);

            const rowCenters = clusterCenters(rowVals, numRows); // ascending = bottom→top
            const colCenters = clusterCenters(colVals, numCols); // ascending

            let assigned = 0;
            const assignedMeshes = new Set();
            for (const { mesh, center } of items) {
                const ri = findNearest(rowCenters, center.y);
                const ci = findNearest(colCenters, center[colAxis]);

                const gridRow = f.rowMin + ri;
                // flipCols: ci=0 (smallest physical) → colMax (rightmost text column),
                // so leftmost text column maps to the largest physical position = left side from outside.
                const gridCol = f.flipCols ? (f.colMax - ci) : (f.colMin + ci);

                if (
                    gridRow >= 0 && gridRow < GRID_ROWS &&
                    gridCol >= 0 && gridCol < GRID_COLS &&
                    gridCells[facadeIdx][gridRow][gridCol] === null
                ) {
                    gridCells[facadeIdx][gridRow][gridCol] = mesh;
                    assignedMeshes.add(mesh);
                    mesh.material = matUnlit;
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    assigned++;
                }
            }
            // Fallback pass 1: unassigned meshes get placed in nearest empty cell in column.
            for (const { mesh, center } of items) {
                if (assignedMeshes.has(mesh)) continue;
                const ci = findNearest(colCenters, center[colAxis]);
                const gridCol = f.flipCols ? (f.colMax - ci) : (f.colMin + ci);
                let bestRow = -1, bestDist = Infinity;
                for (let r = f.rowMin; r <= f.rowMax; r++) {
                    if (gridCells[facadeIdx][r][gridCol] === null) {
                        const dist = Math.abs(rowCenters[r - f.rowMin] - center.y);
                        if (dist < bestDist) { bestDist = dist; bestRow = r; }
                    }
                }
                if (bestRow >= 0) {
                    gridCells[facadeIdx][bestRow][gridCol] = mesh;
                    assignedMeshes.add(mesh);
                    mesh.material = matUnlit;
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    assigned++;
                }
            }
            // Fallback pass 2: column is completely full within declared range.
            // Scan the entire GRID_ROWS space for any empty slot, preferring the
            // row closest to rowMin (bottom). Extend f.rowMin / f.rowMax as needed.
            for (const { mesh, center } of items) {
                if (assignedMeshes.has(mesh)) continue;
                const ci = findNearest(colCenters, center[colAxis]);
                const gridCol = f.flipCols ? (f.colMax - ci) : (f.colMin + ci);
                let bestRow = -1, bestDist = Infinity;
                for (let r = 0; r < GRID_ROWS; r++) {
                    if (gridCells[facadeIdx][r][gridCol] === null) {
                        // prefer rows adjacent to the existing range
                        const dist = Math.min(Math.abs(r - f.rowMin), Math.abs(r - f.rowMax));
                        if (dist < bestDist) { bestDist = dist; bestRow = r; }
                    }
                }
                if (bestRow >= 0) {
                    if (bestRow < f.rowMin) f.rowMin = bestRow;
                    if (bestRow > f.rowMax) f.rowMax = bestRow;
                    gridCells[facadeIdx][bestRow][gridCol] = mesh;
                    assignedMeshes.add(mesh);
                    mesh.material = matUnlit;
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    assigned++;
                }
            }
            console.log(`%cFacade ${f.name}: assigned ${assigned} / ${items.length}`, assigned === items.length ? 'color:lime' : 'color:orange');
        }

        // ─── Text rendering ───────────────────────────────────────────────────────
        // Word-wrap text into rows of CHARS_PER_ROW. Words that don't fit on the
        // current row are moved to the next row; each completed row is padded to
        // CHARS_PER_ROW with spaces so character indices align correctly.
        function wrapText(text) {
            if (!text) return text;
            const words = text.split(' ');
            const rows = [];
            let current = '';
            for (const word of words) {
                if (current === '') {
                    current = word;
                } else if (current.length + 1 + word.length <= CHARS_PER_ROW) {
                    current += ' ' + word;
                } else {
                    rows.push(current.padEnd(CHARS_PER_ROW, ' '));
                    current = word;
                }
            }
            if (current !== '') rows.push(current);
            return rows.join('');
        }

        function clearGrid() {
            for (let fi = 0; fi < 4; fi++) {
                const f = FACADES[fi];
                for (let r = f.rowMin; r <= f.rowMax; r++) {
                    for (let c = f.colMin; c <= f.colMax; c++) {
                        const m = gridCells[fi][r][c];
                        if (m) m.material = matUnlit;
                    }
                }
            }
        }

        function renderText(text) {
            clearGrid();
            if (!text) return;
            text = wrapText(text);

            const limit = Math.min(text.length, MAX_CHARS);
            for (let i = 0; i < limit; i++) {
                const bitmap = FONT[text[i]] ?? FONT[' '];

                // Which horizontal character row and column slot this character occupies
                const charRowIdx = Math.floor(i / CHARS_PER_ROW); // 0 = top row
                const charColIdx = i % CHARS_PER_ROW;

                const { facadeIdx, localCol } = COL_MAP[charColIdx];
                const f = FACADES[facadeIdx];

                for (let fr = 0; fr < CHAR_H; fr++) {
                    const rowBits = bitmap[fr] ?? 0;
                    for (let fc = 0; fc < CHAR_W; fc++) {
                        if (!((rowBits >> (CHAR_W - 1 - fc)) & 1)) continue;

                        const gridRow = TEXT_START_ROW - (charRowIdx * SLOT_H + fr);
                        const gridCol = f.colMin + localCol * SLOT_W + fc;

                        if (gridRow < f.rowMin || gridRow > f.rowMax) continue;
                        if (gridCol < f.colMin || gridCol > f.colMax) continue;

                        const m = gridCells[facadeIdx]?.[gridRow]?.[gridCol];
                        if (m) m.material = matLit;
                    }
                }
            }
        }

        // ─── Flow mode ────────────────────────────────────────────────────────────
        // Column sequence for the scrolling ticker: South → West → North → East.
        // Each entry maps a sequential pixel-column position to a specific grid cell column.
        const FLOW_SEQUENCE = (() => {
            const seq = [];
            for (const fi of [1, 2, 3, 0]) {          // North, West, South, East
                const f = FACADES[fi];
                const numCols = f.colMax - f.colMin + 1;
                for (let ci = 0; ci < numCols; ci++) {
                    seq.push({ facadeIdx: fi, gridCol: f.colMin + ci });
                }
            }
            return seq;
        })();
        // Total columns around the building: 14 + 20 + 20 + 14 = 68

        // Scroll speed in pixel-columns per second
        const FLOW_SPEED = 8;

        let flowMode    = false;
        let flowOffset  = 0;          // fractional pixel-column offset
        let lastFlowTime = null;      // for delta-time tracking
        let currentText = '';

        function renderFlow(text, offset) {
            clearGrid();
            if (!text) return;
            text = wrapText(text);

            // Strip width = one row's worth of char slots (matches static mode's CHARS_PER_ROW).
            // Text wraps into multiple rows just like static mode; all rows scroll together.
            const stripWidth = CHARS_PER_ROW * SLOT_W; // 60
            const numRows = Math.min(Math.ceil(text.length / CHARS_PER_ROW), CHAR_ROWS);

            for (let pos = 0; pos < FLOW_SEQUENCE.length; pos++) {
                const { facadeIdx, gridCol } = FLOW_SEQUENCE[pos];
                const f = FACADES[facadeIdx];

                // Which pixel column of the text strip falls on this facade column?
                const pixelX = ((pos + Math.floor(offset)) % stripWidth + stripWidth) % stripWidth;
                const charColIdx = Math.floor(pixelX / SLOT_W); // 0..CHARS_PER_ROW-1
                const fontCol    = pixelX % SLOT_W;

                if (fontCol >= CHAR_W) continue; // spacing column

                for (let charRowIdx = 0; charRowIdx < numRows; charRowIdx++) {
                    const charIdx = charRowIdx * CHARS_PER_ROW + charColIdx;
                    if (charIdx >= text.length) continue;

                    const bitmap = FONT[text[charIdx]] ?? FONT[' '];

                    for (let fr = 0; fr < CHAR_H; fr++) {
                        const rowBits = bitmap[fr] ?? 0;
                        const bit = (rowBits >> (CHAR_W - 1 - fontCol)) & 1;

                        const gridRow = TEXT_START_ROW - (charRowIdx * SLOT_H + fr);
                        if (gridRow < f.rowMin || gridRow > f.rowMax) continue;
                        if (gridCol < f.colMin || gridCol > f.colMax) continue;

                        const m = gridCells[facadeIdx]?.[gridRow]?.[gridCol];
                        if (m) m.material = bit ? matLit : matUnlit;
                    }
                }
            }
        }

        // ─── Patterns ─────────────────────────────────────────────────────────────
        // Lookup: `${facadeIdx},${gridCol}` → position index in FLOW_SEQUENCE (0–67)
        const FLOW_POS_MAP = new Map(
            FLOW_SEQUENCE.map(({ facadeIdx, gridCol }, pos) => [`${facadeIdx},${gridCol}`, pos])
        );

        function iterateActiveCells(fn) {
            for (let fi = 0; fi < 4; fi++) {
                const f = FACADES[fi];
                for (let r = f.rowMin; r <= f.rowMax; r++) {
                    for (let c = f.colMin; c <= f.colMax; c++) {
                        const m = gridCells[fi][r][c];
                        if (m) fn(m, fi, r, c, f);
                    }
                }
            }
        }

        // 0 — Checkerboard: alternating grid that flips every half-second
        function patternCheckerboard(t) {
            const shift = Math.floor(t * 2);
            iterateActiveCells((m, fi, r, c) => {
                m.material = (r + c + shift) % 2 === 0 ? matLit : matUnlit;
            });
        }

        // 1 — Wave: sine wave travelling continuously around the building
        function patternWave(t) {
            iterateActiveCells((m, fi, r, c, f) => {
                const pos     = FLOW_POS_MAP.get(`${fi},${c}`) ?? 0;
                const relRow  = r - f.rowMin;
                const numRows = f.rowMax - f.rowMin;
                const center  = numRows / 2 + Math.sin(pos * 0.15 - t * 2.5) * (numRows * 0.38);
                m.material = Math.abs(relRow - center) < 2.5 ? matLit : matUnlit;
            });
        }

        // 2 — Rain: independent drops fall down each column, varying speed & timing
        function patternRain(t) {
            iterateActiveCells((m, fi, r, c, f) => {
                const numRows    = f.rowMax - f.rowMin + 1;
                const hash       = (fi * 100 + c) * 7919;
                const period     = 1.4 + (hash % 19) / 10;       // 1.4 – 3.3 s
                const phase      = (hash % 100) / 100;
                const dropT      = (t / period + phase) % 1;
                const dropRow    = f.rowMax - Math.floor(dropT * (numRows + 4));
                const trailLen   = 2 + (hash % 3);                // 2 – 4 cells
                const distFromDrop = dropRow - r;
                m.material = (distFromDrop >= 0 && distFromDrop < trailLen) ? matLit : matUnlit;
            });
        }

        // 3 — Pulse: a bright band orbits the building perimeter at a steady pace
        function patternPulse(t) {
            const total     = FLOW_SEQUENCE.length;  // 68
            const speed     = 18;                    // columns / second
            const bandWidth = 9;
            const head      = (t * speed) % total;

            iterateActiveCells((m, fi, r, c) => {
                const pos  = FLOW_POS_MAP.get(`${fi},${c}`) ?? 0;
                const dist = Math.min(Math.abs(pos - head), total - Math.abs(pos - head));
                m.material = dist < bandWidth ? matLit : matUnlit;
            });
        }

        // 4 — Stripes: diagonal bands scroll across the whole building
        function patternStripes(t) {
            iterateActiveCells((m, fi, r, c, f) => {
                const pos    = FLOW_POS_MAP.get(`${fi},${c}`) ?? 0;
                const relRow = r - f.rowMin;
                const stripe = Math.floor((pos * 0.6 + relRow * 1.2 + t * 5)) % 8;
                m.material = stripe < 4 ? matLit : matUnlit;
            });
        }

        const PATTERNS = [patternCheckerboard, patternWave, patternRain, patternPulse, patternStripes];

        let activePattern   = -1;
        let patternTime     = 0;
        let lastPatternTime = null;

        function setPattern(idx) {
            if (activePattern === idx) {
                activePattern = -1;
                lastPatternTime = null;
                document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
                if (flowMode && currentText) lastFlowTime = null;
                else renderText(currentText);
            } else {
                stopGame();  // patterns override games
                activePattern = idx;
                lastPatternTime = null;
                patternTime = 0;
                document.querySelectorAll('.pattern-btn').forEach(b => b.classList.remove('active'));
                document.querySelector(`.pattern-btn[data-pattern="${idx}"]`).classList.add('active');
            }
        }

        // ─── Game grid ────────────────────────────────────────────────────────────
        // The game world maps exclusively to AlgaeGrid3.glb (facadeIdx: 2, West facade),
        // which has 20 columns × 42 active rows, wrapping horizontally.
        const GAME_SEQUENCE = (() => {
            const seq = [];
            const fi = 2; // West facade (AlgaeGrid3.glb)
            const f = FACADES[fi];
            const numCols = f.colMax - f.colMin + 1;
            for (let ci = 0; ci < numCols; ci++) {
                seq.push({ facadeIdx: fi, gridCol: f.colMin + ci });
            }
            return seq;
        })();



        const GAME_W = GAME_SEQUENCE.length; // 20 columns
        const GAME_H = 42;

        function setCell(gx, gy, mat) {
            gx = ((gx % GAME_W) + GAME_W) % GAME_W;
            if (gy < 0 || gy >= GAME_H) return;
            const { facadeIdx, gridCol } = GAME_SEQUENCE[gx];
            const f = FACADES[facadeIdx];
            const gridRow = f.rowMax - gy;
            const m = gridCells[facadeIdx]?.[gridRow]?.[gridCol];
            if (m) m.material = mat;
        }

        let activeGame = null; // 'snake' | 'tetris' | null

        function stopGame() {
            if (activeGame === 'snake') clearInterval(sn.timer);
            if (activeGame === 'tetris') clearInterval(tr.timer);
            activeGame = null;
            document.getElementById('snake-btn').classList.remove('active');
            document.getElementById('tetris-btn').classList.remove('active');
            const gi = document.getElementById('game-info');
            gi.style.opacity = '0';
            const gc = document.getElementById('game-controls');
            gc.style.opacity = '0';

            clearGrid();
            if (flowMode && currentText) {
                lastFlowTime = null;
            } else {
                renderText(currentText);
            }
        }

        function gameInfo(msg) {
            const gi = document.getElementById('game-info');
            const gs = document.getElementById('game-score');
            gs.textContent = msg;
            gi.style.opacity = '1';
        }

        function gameControls(msg) {
            const gc = document.getElementById('game-controls');
            gc.textContent = msg;
            gc.style.opacity = '1';
        }

        // ─── SNAKE ────────────────────────────────────────────────────────────────
        const sn = {
            body:[], dir:{dx:1,dy:0}, next:{dx:1,dy:0},
            food:null, alive:false, score:0, timer:null, dirty:false
        };

        function snakeStart() {
            activeGame = 'snake';
            setPattern(-1);
            if (musicMode) stopAudio();
            document.getElementById('snake-btn').classList.add('active');

            clearInterval(sn.timer);
            const cx = Math.floor(GAME_W/2), cy = Math.floor(GAME_H/2);
            sn.body = [{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
            sn.dir  = {dx:1,dy:0};
            sn.next = {dx:1,dy:0};
            sn.alive = true; sn.score = 0;
            snakeSpawnFood();
            sn.timer = setInterval(snakeTick, 130);
            sn.dirty = true;
            gameInfo('snake — score: 0');
            gameControls('controls: arrows to move');
        }

        function snakeSpawnFood() {
            const occ = new Set(sn.body.map(c => `${c.x},${c.y}`));
            let x, y;
            do { x = Math.floor(Math.random()*GAME_W); y = Math.floor(Math.random()*GAME_H); }
            while (occ.has(`${x},${y}`));
            sn.food = {x, y};
        }

        function snakeTick() {
            if (!sn.alive) return;
            sn.dir = sn.next;
            const h = sn.body[0];
            const nx = ((h.x + sn.dir.dx) + GAME_W) % GAME_W;
            const ny = ((h.y + sn.dir.dy) + GAME_H) % GAME_H;
            if (sn.body.some(c => c.x === nx && c.y === ny)) {
                sn.alive = false;
                gameInfo(`snake — game over   score: ${sn.score}   (space to restart)`);
                sn.dirty = true; return;
            }
            sn.body.unshift({x:nx, y:ny});
            if (nx === sn.food.x && ny === sn.food.y) {
                sn.score++;
                snakeSpawnFood();
                gameInfo(`snake — score: ${sn.score}`);
            } else { sn.body.pop(); }
            sn.dirty = true;
        }

        function renderSnake() {
            clearGrid();
            if (sn.food) setCell(sn.food.x, sn.food.y, matLit);
            sn.body.forEach((c, i) => setCell(c.x, c.y, matLit));
        }

        // ─── TETRIS ───────────────────────────────────────────────────────────────
        // Tetris occupies the first TR_W columns of GAME_W (= the West facade, 20 cols × 42 rows)
        const TR_W = 20, TR_H = GAME_H;

        // Piece rotations: each entry is [[dx,dy],...] offsets from piece origin
        const TETROS = [
            [[[0,0],[1,0],[2,0],[3,0]], [[1,0],[1,1],[1,2],[1,3]]],                                   // I
            [[[0,0],[1,0],[0,1],[1,1]]],                                                               // O
            [[[1,0],[0,1],[1,1],[2,1]], [[0,0],[0,1],[1,1],[0,2]], [[0,0],[1,0],[2,0],[1,1]], [[1,0],[0,1],[1,1],[1,2]]], // T
            [[[2,0],[0,1],[1,1],[2,1]], [[0,0],[0,1],[0,2],[1,2]], [[0,0],[1,0],[2,0],[0,1]], [[0,0],[1,0],[1,1],[1,2]]], // L
            [[[0,0],[0,1],[1,1],[2,1]], [[0,0],[1,0],[0,1],[0,2]], [[0,0],[1,0],[2,0],[2,1]], [[1,0],[0,1],[1,1],[1,2]]], // J
            [[[1,0],[2,0],[0,1],[1,1]], [[0,0],[0,1],[1,1],[1,2]]],                                   // S
            [[[0,0],[1,0],[1,1],[2,1]], [[1,0],[0,1],[1,1],[0,2]]]                                    // Z
        ];

        const tr = {
            board:[], type:0, rot:0, px:0, py:0,
            alive:false, score:0, lines:0, speed:500, timer:null, dirty:false
        };

        function trCells(type, rot, px, py) {
            return TETROS[type][rot % TETROS[type].length].map(([dx,dy]) => ({x:px+dx, y:py+dy}));
        }

        function trCanPlace(type, rot, px, py) {
            return trCells(type, rot, px, py).every(({x, y}) => {
                if (x < 0 || x >= TR_W || y >= TR_H) return false;
                if (y < 0) return true; // above the ceiling is fine during spawn
                return !tr.board[y][x];
            });
        }

        function tetrisStart() {
            activeGame = 'tetris';
            setPattern(-1);
            if (musicMode) stopAudio();
            document.getElementById('tetris-btn').classList.add('active');

            clearInterval(tr.timer);
            tr.board = Array.from({length:TR_H}, () => new Array(TR_W).fill(false));
            tr.alive = true; tr.score = 0; tr.lines = 0; tr.speed = 500;
            trSpawn();
            tr.timer = setInterval(trTick, tr.speed);
            tr.dirty = true;
            gameInfo('tetris — score: 0');
            gameControls('controls: arrows to move/rotate · space to drop');
        }

        function trSpawn() {
            tr.type = Math.floor(Math.random() * TETROS.length);
            tr.rot = 0; tr.py = -1; tr.px = Math.floor(TR_W/2) - 1;
            if (!trCanPlace(tr.type, tr.rot, tr.px, tr.py)) {
                tr.alive = false;
                gameInfo(`tetris — game over   score: ${tr.score}   (space to restart)`);
            }
        }

        function trTick() {
            if (!tr.alive) return;
            if (trCanPlace(tr.type, tr.rot, tr.px, tr.py + 1)) {
                tr.py++;
            } else {
                trCells(tr.type, tr.rot, tr.px, tr.py).forEach(({x,y}) => { if (y >= 0) tr.board[y][x] = true; });
                let cleared = 0;
                for (let y = TR_H - 1; y >= 0; y--) {
                    if (tr.board[y].every(Boolean)) {
                        tr.board.splice(y, 1);
                        tr.board.unshift(new Array(TR_W).fill(false));
                        cleared++; y++;
                    }
                }
                if (cleared) {
                    tr.lines += cleared;
                    tr.score += [0,100,300,500,800][cleared] ?? 800;
                    tr.speed = Math.max(80, 500 - Math.floor(tr.lines / 10) * 50);
                    clearInterval(tr.timer);
                    tr.timer = setInterval(trTick, tr.speed);
                    gameInfo(`tetris — score: ${tr.score}   lines: ${tr.lines}`);
                }
                trSpawn();
            }
            tr.dirty = true;
        }

        function renderTetris() {
            clearGrid();
            for (let y = 0; y < TR_H; y++)
                for (let x = 0; x < TR_W; x++)
                    if (tr.board[y][x]) setCell(x, y, matLit);
            if (tr.alive)
                trCells(tr.type, tr.rot, tr.px, tr.py).forEach(({x,y}) => { if (y >= 0) setCell(x, y, matLit); });
        }

        // ─── MUSIC ────────────────────────────────────────────────────────────────
        let audioCtx = null, analyserNode = null, audioSrc = null, audioBuf = null;
        let musicMode = false, freqData = null;

        function initAudio() {
            if (audioCtx) return;
            audioCtx = new AudioContext();
            analyserNode = audioCtx.createAnalyser();
            analyserNode.fftSize = 256;
            analyserNode.smoothingTimeConstant = 0.75;
            analyserNode.connect(audioCtx.destination);
            freqData = new Uint8Array(analyserNode.frequencyBinCount); // 128 bins
        }

        async function loadAudioFile(file) {
            initAudio();
            const ab = await file.arrayBuffer();
            audioBuf = await audioCtx.decodeAudioData(ab);
            document.getElementById('music-play-btn').disabled = false;
        }

        async function loadAudioUrl(url) {
            initAudio();
            const response = await fetch(url);
            const ab = await response.arrayBuffer();
            audioBuf = await audioCtx.decodeAudioData(ab);
            document.getElementById('music-play-btn').disabled = false;
            // Provide a visual cue that it loaded successfully
            document.getElementById('music-play-btn').textContent = 'play (ready)';
        }

        function playAudio() {
            if (!audioBuf) return;
            if (audioSrc) { try { audioSrc.stop(); } catch(e) {} audioSrc = null; }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            audioSrc = audioCtx.createBufferSource();
            audioSrc.buffer = audioBuf;
            audioSrc.connect(analyserNode);
            audioSrc.loop = true;
            audioSrc.start();
            musicMode = true;
            document.getElementById('music-play-btn').textContent = 'stop';
        }

        function stopAudio() {
            if (audioSrc) { try { audioSrc.stop(); } catch(e) {} audioSrc = null; }
            musicMode = false;
            document.getElementById('music-play-btn').textContent = 'play';
            clearGrid();
            if (flowMode && currentText) lastFlowTime = null;
            else renderText(currentText);
        }

        function renderMusic() {
            analyserNode.getByteFrequencyData(freqData);
            // Single waveform stretches across all 68 columns of the building perimeter.
            // pos=0 (first column of North) = bass; pos=67 (last column of East) = treble.
            const total = FLOW_SEQUENCE.length;
            for (let pos = 0; pos < total; pos++) {
                const { facadeIdx, gridCol } = FLOW_SEQUENCE[pos];
                const f = FACADES[facadeIdx];
                const numRows = f.rowMax - f.rowMin + 1;
                // Log-scale: bass/mids occupy more columns so the shape looks natural
                const t = total > 1 ? pos / (total - 1) : 0;
                const binIdx = Math.floor(Math.pow(t, 0.6) * freqData.length * 0.8);
                const amp = freqData[Math.min(binIdx, freqData.length - 1)] / 255;
                const litH = Math.ceil(amp * numRows);
                for (let r = f.rowMin; r <= f.rowMax; r++) {
                    const fromBottom = r - f.rowMin;
                    const m = gridCells[facadeIdx]?.[r]?.[gridCol];
                    if (m) m.material = fromBottom < litH ? matLit : matUnlit;
                }
            }
        }

        // ─── Keyboard controls (games only) ───────────────────────────────────────
        document.addEventListener('keydown', e => {
            if (document.activeElement === document.getElementById('display-input')) return;

            if (activeGame === 'snake') {
                const {dx,dy} = sn.dir;
                if (e.key==='ArrowLeft'  && dx !== 1)  { sn.next={dx:-1,dy:0}; e.preventDefault(); }
                if (e.key==='ArrowRight' && dx !== -1) { sn.next={dx:1,dy:0};  e.preventDefault(); }
                if (e.key==='ArrowUp'    && dy !== 1)  { sn.next={dx:0,dy:-1}; e.preventDefault(); }
                if (e.key==='ArrowDown'  && dy !== -1) { sn.next={dx:0,dy:1};  e.preventDefault(); }
                if (e.key===' ' && !sn.alive) { snakeStart(); e.preventDefault(); }
            }

            if (activeGame === 'tetris') {
                if (!tr.alive) {
                    if (e.key === ' ') { tetrisStart(); e.preventDefault(); } return;
                }
                if (e.key==='ArrowLeft'  && trCanPlace(tr.type,tr.rot,tr.px-1,tr.py)) { tr.px--; tr.dirty=true; e.preventDefault(); }
                if (e.key==='ArrowRight' && trCanPlace(tr.type,tr.rot,tr.px+1,tr.py)) { tr.px++; tr.dirty=true; e.preventDefault(); }
                if (e.key==='ArrowDown'  && trCanPlace(tr.type,tr.rot,tr.px,tr.py+1)) { tr.py++; tr.dirty=true; e.preventDefault(); }
                if (e.key==='ArrowUp') {
                    const nr = (tr.rot+1) % TETROS[tr.type].length;
                    if (trCanPlace(tr.type,nr,tr.px,tr.py)) { tr.rot=nr; tr.dirty=true; }
                    e.preventDefault();
                }
                if (e.key===' ') {
                    while (trCanPlace(tr.type,tr.rot,tr.px,tr.py+1)) tr.py++;
                    trTick(); e.preventDefault();
                }
            }
        });

        // ─── Scene setup ──────────────────────────────────────────────────────────
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(0, 4, 12);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 1;
        controls.maxDistance = 500;

        // Lighting
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        const key = new THREE.DirectionalLight(0xffffff, 2.0);
        key.position.set(5, 10, 7);
        key.castShadow = true;
        key.shadow.mapSize.set(2048, 2048);
        scene.add(key);

        const fill = new THREE.DirectionalLight(0xffffff, 0.4);
        fill.position.set(-6, 4, -4);
        scene.add(fill);

        scene.add(new THREE.DirectionalLight(0xcccccc, 0.3)).position.set(0, -3, -8);

        // ─── Model loading ────────────────────────────────────────────────────────
        const models = [
            { file: 'models/Base.glb',        isGrid: false, isBase: true },
            { file: 'models/AlgaeGrid1.glb',  isGrid: true,  facadeIdx: 0 },
            { file: 'models/AlgaeGrid2.glb',  isGrid: true,  facadeIdx: 1 },
            { file: 'models/AlgaeGrid3.glb',  isGrid: true,  facadeIdx: 2 },
            { file: 'models/AlgaeGrid4.glb',  isGrid: true,  facadeIdx: 3 },
            { file: 'models/StructuralRail.glb', isGrid: false, materialName: 'matSilver' },
            { file: 'models/FacadePanels.glb', isGrid: false, materialName: 'matMarble' },
            { file: 'models/HudsonBuildings.glb', isGrid: false, materialName: 'matTranslucentWhite' },
            { file: 'models/HudsonSite.glb', isGrid: false },
            { file: 'models/ProceduralSite.glb', isGrid: false, isProcedural: true },
            { file: 'models/River.glb', isGrid: false, materialName: 'matWater' },
        ];

        const loader = new GLTFLoader();
        const loadingEl = document.getElementById('loading');
        const group = new THREE.Group();
        scene.add(group);
        let loaded = 0;
        let baseMesh = null;

        function generateProceduralCityscape(siteRoot) {
            // Force world matrix update so bounding box is correct
            siteRoot.updateMatrixWorld(true);

            // Compute bounding box to know the procedural area bounds
            const box = new THREE.Box3().setFromObject(siteRoot);
            const size = new THREE.Vector3();
            box.getSize(size);

            // Set up a grid inside the bounding box
            // Put a sensible upper bound to prevent infinite loops/hangs if the site mesh is huge
            // Increase spacing so it doesn't take forever / crash browser with too many boxes
            const spacingX = size.x / 50;
            const spacingZ = size.z / 50;
            const cols = 50;
            const rows = 50;

            // Create a single instanced mesh for performance
            // Make the boxes scale relative to the spacing so they fit the grid nicely
            const geometry = new THREE.BoxGeometry(spacingX * 0.8, 1, spacingZ * 0.8);
            geometry.translate(0, 0.5, 0); // shift origin to bottom
            const count = cols * rows;
            const instancedMesh = new THREE.InstancedMesh(geometry, matTranslucentWhite, count);
            instancedMesh.castShadow = true;
            instancedMesh.receiveShadow = true;

            const raycaster = new THREE.Raycaster();
            const downDir = new THREE.Vector3(0, -1, 0);
            const dummy = new THREE.Object3D();


            // Site mesh to intersect against
            const meshes = [];
            siteRoot.traverse(c => { if (c.isMesh) meshes.push(c); });

            let instanceIdx = 0;
            const yRayStart = box.max.y + 10;

            for (let i = 0; i < cols; i++) {
                for (let j = 0; j < rows; j++) {
                    const px = box.min.x + (i + 0.5) * spacingX;
                    const pz = box.min.z + (j + 0.5) * spacingZ;

                    raycaster.set(new THREE.Vector3(px, yRayStart, pz), downDir);
                    const intersects = raycaster.intersectObjects(meshes, false);

                    if (intersects.length > 0) {
                        // We hit the procedural surface! Put a building here.
                        const hitY = intersects[0].point.y;


                        // Randomize height a bit, mimicking small blocks
                        // Scale height based on spacing so they look proportional
                        const height = (0.5 + Math.random() * 2.5) * spacingX;

                        dummy.position.set(px, hitY, pz);
                        dummy.scale.set(1, height, 1);
                        dummy.updateMatrix();

                        instancedMesh.setMatrixAt(instanceIdx, dummy.matrix);
                        instanceIdx++;
                    }
                }
            }

            instancedMesh.count = instanceIdx; // only render the populated ones
            group.add(instancedMesh);
        }

        function onAllLoaded() {
            const targetObject = baseMesh || group;
            const box = new THREE.Box3().setFromObject(targetObject);
            const center = new THREE.Vector3();
            const size = new THREE.Vector3();
            box.getCenter(center);
            box.getSize(size);

            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            const dist = (maxDim / 2) / Math.tan(fov / 2) * 1.6;

            camera.position.set(center.x, center.y + maxDim * 0.25, center.z + dist);
            camera.lookAt(center);
            controls.target.copy(center);
            controls.update();

            loadingEl.style.opacity = '0';
            setTimeout(() => loadingEl.style.display = 'none', 500);

            // Show the input panel
            document.getElementById('text-panel').classList.add('ready');
        }

        const materialMap = {
            'matSilver': matSilver,
            'matMarble': matMarble,
            'matTranslucentWhite': matTranslucentWhite,
            'matWater': matWater
        };

        models.forEach(({ file, isGrid, isBase, isProcedural, facadeIdx, materialName }) => {
            loader.load(
                file,
                (gltf) => {
                    const root = gltf.scene;
                    root.position.set(0, 0, 0);

                    if (isBase) baseMesh = root;

                    if (isGrid) {
                        buildFacadeGrid(facadeIdx, root);
                    } else {
                        root.traverse(child => {
                            if (child.isMesh) {
                                child.castShadow = true;
                                child.receiveShadow = true;
                                if (materialName && materialMap[materialName]) {
                                    child.material = materialMap[materialName];
                                }
                                if (child.material) {
                                    const mats = Array.isArray(child.material) ? child.material : [child.material];
                                    mats.forEach(m => { m.needsUpdate = true; });
                                }
                            }
                        });
                    }

                    if (isProcedural) {
                        generateProceduralCityscape(root);
                    }

                    group.add(root);
                    loaded++;
                    loadingEl.textContent = `loading models... ${loaded} / ${models.length}`;
                    if (loaded === models.length) onAllLoaded();
                },
                undefined,
                (err) => {
                    console.warn(`Could not load ${file}:`, err);
                    loaded++;
                    if (loaded === models.length) onAllLoaded();
                }
            );
        });

        // ─── UI ───────────────────────────────────────────────────────────────────
        const input      = document.getElementById('display-input');
        const charCount  = document.getElementById('char-count');
        const clearBtn   = document.getElementById('clear-btn');
        const staticBtn  = document.getElementById('static-btn');
        const flowBtn    = document.getElementById('flow-btn');

        function setMode(mode) {
            flowMode = (mode === 'flow');
            staticBtn.classList.toggle('active', !flowMode);
            flowBtn.classList.toggle('active', flowMode);

            if (flowMode) {
                // Reset scroll so it starts fresh when switching to flow
                flowOffset  = 0;
                lastFlowTime = null;
                charCount.textContent = `${currentText.length} chars`;
            } else {
                lastFlowTime = null;
                charCount.textContent = `${currentText.length} / ${MAX_CHARS}`;
                renderText(currentText);
            }
        }

        staticBtn.addEventListener('click', () => setMode('static'));
        flowBtn.addEventListener('click',   () => setMode('flow'));

        input.addEventListener('input', () => {
            currentText = input.value;
            if (flowMode) {
                flowOffset = 0;           // restart scroll on new text
                lastFlowTime = null;
                charCount.textContent = `${currentText.length} chars`;
            } else {
                charCount.textContent = `${currentText.length} / ${MAX_CHARS}`;
                renderText(currentText);
            }
        });

        clearBtn.addEventListener('click', () => {
            input.value = '';
            currentText = '';
            flowOffset  = 0;
            lastFlowTime = null;
            charCount.textContent = flowMode ? '0 chars' : `0 / ${MAX_CHARS}`;
            clearGrid();
            input.focus();
        });

        // ─── Resize & render loop ─────────────────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        function animate(now) {
            requestAnimationFrame(animate);

            if (activeGame === 'snake') {
                if (sn.dirty) { renderSnake(); sn.dirty = false; }
            } else if (activeGame === 'tetris') {
                if (tr.dirty) { renderTetris(); tr.dirty = false; }
            } else if (musicMode && analyserNode) {
                renderMusic();
            } else if (activePattern >= 0) {
                if (lastPatternTime !== null) {
                    patternTime += (now - lastPatternTime) / 1000;
                }
                lastPatternTime = now;
                PATTERNS[activePattern](patternTime);
            } else if (flowMode && currentText) {
                if (lastFlowTime !== null) {
                    const dt = now - lastFlowTime;
                    flowOffset += FLOW_SPEED * dt / 1000;
                    flowOffset = flowOffset % (CHARS_PER_ROW * SLOT_W);
                    renderFlow(currentText, flowOffset);
                }
                lastFlowTime = now;
            }

            controls.update();
            renderer.render(scene, camera);
        }
        animate(0);

        document.querySelectorAll('.pattern-btn').forEach(btn => {
            btn.addEventListener('click', () => setPattern(Number(btn.dataset.pattern)));
        });

        document.getElementById('snake-btn').addEventListener('click', () => {
            if (activeGame === 'snake') { stopGame(); return; }
            snakeStart();
        });

        document.getElementById('tetris-btn').addEventListener('click', () => {
            if (activeGame === 'tetris') { stopGame(); return; }
            tetrisStart();
        });

        document.querySelectorAll('.track-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (musicMode) stopAudio();
                document.getElementById('music-play-btn').textContent = 'loading...';
                document.getElementById('music-play-btn').disabled = true;
                loadAudioUrl(btn.dataset.file);
            });
        });

        document.getElementById('music-input').addEventListener('change', e => {
            const file = e.target.files[0];
            if (file) {
                document.getElementById('music-play-btn').textContent = 'loading...';
                document.getElementById('music-play-btn').disabled = true;
                loadAudioFile(file).then(() => {
                    document.getElementById('music-play-btn').textContent = 'play (ready)';
                });
            }
        });

        document.getElementById('music-play-btn').addEventListener('click', () => {
            if (musicMode) {
                stopAudio();
            } else {
                playAudio();
            }
        });
    </script>
</body>
</html>
