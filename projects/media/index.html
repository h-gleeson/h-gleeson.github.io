<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media — spare-desk.space</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        #back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            border-bottom: 1px dashed transparent;
            transition: border-bottom 0.2s;
            z-index: 10;
        }
        #back-link:hover {
            border-bottom: 1px dashed #fff;
        }

        #title {
            position: fixed;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            z-index: 10;
            text-align: right;
            line-height: 1.6;
        }

        #loading {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            z-index: 10;
            transition: opacity 0.5s;
        }

        #hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: #444;
            font-size: 0.75rem;
            letter-spacing: 0.08em;
            z-index: 10;
            line-height: 1.7;
            text-align: right;
        }
    </style>
</head>
<body>
    <a id="back-link" href="../../index.html">← back</a>
    <div id="title">Henry Gleeson<br>Media</div>
    <div id="loading">loading models...</div>
    <div id="hint">drag to orbit &nbsp;·&nbsp; scroll to zoom &nbsp;·&nbsp; right-drag to pan</div>

    <div id="canvas-container"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        // Camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(0, 4, 12);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 1;
        controls.maxDistance = 500;

        // Lighting — white/grey tones to match site aesthetic
        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);

        const key = new THREE.DirectionalLight(0xffffff, 2.0);
        key.position.set(5, 10, 7);
        key.castShadow = true;
        key.shadow.mapSize.set(2048, 2048);
        scene.add(key);

        const fill = new THREE.DirectionalLight(0xffffff, 0.4);
        fill.position.set(-6, 4, -4);
        scene.add(fill);

        const rim = new THREE.DirectionalLight(0xcccccc, 0.3);
        rim.position.set(0, -3, -8);
        scene.add(rim);

        // Models to load — Base first so it's centred, grids around it
        const models = [
            { file: 'models/Base.glb',       position: new THREE.Vector3(0, 0, 0) },
            { file: 'models/AlgaeGrid1.glb',  position: new THREE.Vector3(0, 0, 0) },
            { file: 'models/AlgaeGrid2.glb',  position: new THREE.Vector3(0, 0, 0) },
            { file: 'models/AlgaeGrid3.glb',  position: new THREE.Vector3(0, 0, 0) },
            { file: 'models/AlgaeGrid4.glb',  position: new THREE.Vector3(0, 0, 0) },
        ];

        const loader = new GLTFLoader();
        const loadingEl = document.getElementById('loading');
        let loaded = 0;
        const group = new THREE.Group();
        scene.add(group);

        function onAllLoaded() {
            // Auto-frame: fit camera to bounding box of the whole group
            const box = new THREE.Box3().setFromObject(group);
            const center = new THREE.Vector3();
            const size = new THREE.Vector3();
            box.getCenter(center);
            box.getSize(size);

            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            const dist = (maxDim / 2) / Math.tan(fov / 2) * 1.6;

            camera.position.set(center.x, center.y + maxDim * 0.25, center.z + dist);
            camera.lookAt(center);
            controls.target.copy(center);
            controls.update();

            loadingEl.style.opacity = '0';
            setTimeout(() => loadingEl.style.display = 'none', 500);
        }

        models.forEach(({ file, position }) => {
            loader.load(
                file,
                (gltf) => {
                    const mesh = gltf.scene;
                    mesh.position.copy(position);
                    mesh.traverse(child => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                            // Preserve original materials but ensure they look good on black
                            if (child.material) {
                                const mats = Array.isArray(child.material) ? child.material : [child.material];
                                mats.forEach(m => { m.needsUpdate = true; });
                            }
                        }
                    });
                    group.add(mesh);
                    loaded++;
                    loadingEl.textContent = `loading models... ${loaded}/${models.length}`;
                    if (loaded === models.length) onAllLoaded();
                },
                undefined,
                (err) => {
                    console.warn(`Could not load ${file}:`, err);
                    loaded++;
                    if (loaded === models.length) onAllLoaded();
                }
            );
        });

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Animate
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
