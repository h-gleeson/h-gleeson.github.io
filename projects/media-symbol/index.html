<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Diagram</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #ede9e0; font-family: 'Courier New', Courier, monospace; overflow: hidden; user-select: none; }
        canvas { display: block; }
        header { position: fixed; top: 0; left: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 18px 28px; z-index: 100; pointer-events: none; }
        .site-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; color: #222; }
        #info-panel { position: fixed; bottom: 0; left: 0; width: 310px; background: rgba(237,233,224,0.97); border-top: 1px solid #333; border-right: 1px solid #333; padding: 22px 24px 28px; transform: translateY(100%); transition: transform 0.28s cubic-bezier(0.4,0,0.2,1); z-index: 100; }
        #info-panel.visible { transform: translateY(0); }
        .panel-eyebrow { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 3px; color: #888; margin-bottom: 8px; }
        .panel-name { font-size: 0.9rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #111; margin-bottom: 4px; }
        .panel-subtitle { font-size: 0.65rem; color: #777; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid #ccc; }
        .panel-desc { font-size: 0.7rem; line-height: 1.75; color: #333; }
        #legend { position: fixed; top: 56px; right: 28px; z-index: 100; max-height: calc(100vh - 120px); overflow-y: auto; }
        .legend-heading { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 3px; color: #888; margin-bottom: 10px; }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 0.58rem; text-transform: uppercase; letter-spacing: 1px; color: #333; cursor: pointer; transition: opacity 0.15s; }
        .legend-item:hover { opacity: 0.45; }
        .legend-swatch { width: 10px; height: 10px; border: 1px solid #555; flex-shrink: 0; }
        #controls-hint { position: fixed; bottom: 28px; right: 28px; font-size: 0.55rem; text-transform: uppercase; letter-spacing: 2px; color: #aaa; text-align: right; line-height: 2.2; z-index: 100; pointer-events: none; }
        #hover-tag { position: fixed; pointer-events: none; z-index: 200; background: #111; color: #ede9e0; font-size: 0.58rem; text-transform: uppercase; letter-spacing: 2px; padding: 5px 10px; opacity: 0; transition: opacity 0.12s; white-space: nowrap; }
        #hover-tag.visible { opacity: 1; }
        #loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #ede9e0; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; color: #666; z-index: 500; transition: opacity 0.6s; }
        #loading.hidden { opacity: 0; pointer-events: none; }
        #loading-bar-wrap { width: 160px; height: 1px; background: #ccc; margin-top: 20px; }
        #loading-bar { height: 100%; width: 0%; background: #333; transition: width 0.3s; }
    </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="loading"><span id="loading-label">Loading</span><div id="loading-bar-wrap"><div id="loading-bar"></div></div></div>
<header><span class="site-title">Program Diagram</span></header>
<div id="info-panel">
    <div class="panel-eyebrow">Program Element</div>
    <div class="panel-name" id="panel-name">-</div>
    <div class="panel-subtitle" id="panel-subtitle">-</div>
    <div class="panel-desc" id="panel-desc">-</div>
</div>
<div id="legend"><div class="legend-heading">Program</div></div>
<div id="controls-hint">Drag &middot; Orbit<br>Scroll &middot; Zoom<br>Right-drag &middot; Pan<br>Hover &middot; Explore</div>
<div id="hover-tag"></div>

<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { GLTFLoader }    from "three/addons/loaders/GLTFLoader.js";

// =============================================================================
//  PROGRAM DATA
//
//  Each entry is one GLB file.  All meshes in that file share the same
//  color and program label -- they behave as a single interactive element.
//
//  If you later name individual meshes in Rhino/Blender before exporting,
//  set  perMesh: true  and add a  meshInfo  map of { "MeshName": {...} }
//  to get per-mesh hover labels instead.
// =============================================================================
const MODELS = [
    {
        path:     "./models/datastacks.glb",
        name:     "Datastacks",
        subtitle: "Program Element",
        desc:     "Description of the datastacks program element. Edit this text in the MODELS array.",
        color:    0xc8c4bc,
    },
    {
        path:     "./models/media.glb",
        name:     "Media",
        subtitle: "Program Element",
        desc:     "Description of the media program element. Edit this text in the MODELS array.",
        color:    0xe4e0d4,
    },
    {
        path:     "./models/waveforms.glb",
        name:     "Waveforms",
        subtitle: "Program Element",
        desc:     "Description of the waveforms program element. Edit this text in the MODELS array.",
        color:    0xd4d0c6,
    },
    // Context models -- loaded for visual reference only, no hover labels or legend entries
    { path: "./models/highline.glb", contextOnly: true, walkable: true, color: 0xd0cdc6 },
];

// =============================================================================
//  SCENE
// =============================================================================
const canvas   = document.getElementById("c");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xede9e0);
// fog removed

const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.01, 2000);
camera.position.set(40, 34, 52);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance   = 0.5;
controls.maxDistance   = 800;
controls.maxPolarAngle = Math.PI / 2.05;
controls.target.set(0, 5, 0);
controls.update();

scene.add(new THREE.AmbientLight(0xfaf6ec, 1.8));
const sun = new THREE.DirectionalLight(0xfff4d6, 2.5);
sun.position.set(28, 48, 32);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 800;
sun.shadow.camera.left = -100; sun.shadow.camera.right = 100;
sun.shadow.camera.top = 100; sun.shadow.camera.bottom = -100;
sun.shadow.bias = -0.0005;
scene.add(sun);
const fill = new THREE.DirectionalLight(0xddeeff, 0.55);
fill.position.set(-28, 18, -24);
scene.add(fill);

const gm = new THREE.Mesh(new THREE.PlaneGeometry(1200,1200), new THREE.MeshLambertMaterial({ color: 0xd8d4cc }));
gm.rotation.x = -Math.PI/2; gm.receiveShadow = true; scene.add(gm);
const grid = new THREE.GridHelper(1200, 600, 0xc4c0b8, 0xc4c0b8);
grid.position.y = 0.01; scene.add(grid);

// =============================================================================
//  TREES
// =============================================================================
const treeGroup = new THREE.Group();
scene.add(treeGroup);

function makeTree(x, z, s) {
    const g  = new THREE.Group();
    const tm = new THREE.MeshLambertMaterial({ color: 0x897050 });
    const la = new THREE.MeshLambertMaterial({ color: 0x7a9a66 });
    const lb = new THREE.MeshLambertMaterial({ color: 0x688a55 });
    const tr = new THREE.Mesh(new THREE.CylinderGeometry(0.14*s,0.19*s,1.6*s,6), tm);
    tr.position.y = 0.8*s; tr.castShadow = true; g.add(tr);
    [[2.1*s,3.0*s,la,2.9*s],[1.5*s,2.6*s,lb,4.4*s],[0.9*s,2.1*s,la,5.7*s]].forEach(([r,h,m,y]) => {
        const c = new THREE.Mesh(new THREE.ConeGeometry(r,h,8), m);
        c.position.y = y; c.castShadow = true; g.add(c);
    });
    g.position.set(x, 0, z);
    treeGroup.add(g);
}

const TREE_LAYOUT = [
    [-1.4,-1.0,1],[-1.6,0,0.9],[-1.4,1.0,1],
    [1.3,-1.2,1],[1.5,0.4,1],[1.6,1.2,0.9],
    [0.4,-1.5,1],[-0.6,-1.5,1],[1.0,-1.3,0.85],
    [-1.2,1.3,1],[0.3,1.6,0.9],[1.2,1.4,1],
];

function plantTrees(cx, cz, radius, treeScale) {
    treeGroup.clear();
    TREE_LAYOUT.forEach(([nx,nz,s]) => makeTree(cx + nx*radius, cz + nz*radius, s * treeScale));
}
plantTrees(0, 0, 20, 1);

// =============================================================================
//  CLOUDS
// =============================================================================
const cloudGroup = new THREE.Group();
scene.add(cloudGroup);

function makeCloud(x, y, z, scale) {
    const g   = new THREE.Group();
    const mat = new THREE.MeshLambertMaterial({ color: 0xf5f2ec, transparent: true, opacity: 0.82 });
    const puffs = [
        [0,    0,    0,    1.0],
        [1.4,  0.2,  0.3,  0.75],
        [-1.3, 0.1, -0.2,  0.7],
        [0.5,  0.55, 0.1,  0.6],
        [-0.4, 0.45, 0.2,  0.55],
        [0.8, -0.15, 0.8,  0.5],
    ];
    puffs.forEach(([px, py, pz, r]) => {
        const m = new THREE.Mesh(
            new THREE.SphereGeometry(r, 7, 5),
            mat
        );
        m.position.set(px, py, pz);
        m.scale.y = 0.42;  // flatten vertically
        g.add(m);
    });
    g.position.set(x, y, z);
    g.userData.driftSpeed = 0.003 + Math.random() * 0.003;
    g.userData.driftOffset = Math.random() * Math.PI * 2;
    g.userData.baseY = y;
    cloudGroup.add(g);
    return g;
}

const clouds = [
    makeCloud(-60, 90,  30,  1),
    makeCloud( 40, 110,-50,  1),
    makeCloud( 10,  80, 70,  1),
    makeCloud(-80, 100,-20,  1),
    makeCloud( 55,  95, 15,  1),
];

function stepClouds(t) {
    clouds.forEach(c => {
        c.position.x += c.userData.driftSpeed;
        c.position.y = c.userData.baseY + Math.sin(t * 0.0004 + c.userData.driftOffset) * 1.5;
    });
}


// =============================================================================
//  LOAD MODELS
//
//  Each file is treated as one program element.  All its meshes share the
//  same color and respond to hover as a group.
// =============================================================================
const interactiveMeshes = [];   // { mesh, info }  -- all hoverable meshes
const edgesMap     = new Map();   // mesh.uuid -> LineSegments
const loader     = new GLTFLoader();
const loadingBar = document.getElementById("loading-bar");
const loadingLbl = document.getElementById("loading-label");
let   loadedCount = 0;

function loadModel(entry) {
    return new Promise((resolve, reject) => {
        loader.load(entry.path, gltf => {
            gltf.scene.traverse(child => {
                if (!child.isMesh) return;
                child.castShadow = child.receiveShadow = true;
                child.material = new THREE.MeshStandardMaterial({
                    color: entry.color, roughness: 0.88, metalness: 0,
                });
                if (entry.contextOnly) return;  // no edges or hover for context models
                // Edge lines
                const eg = new THREE.EdgesGeometry(child.geometry, 12);
                const em = new THREE.LineBasicMaterial({ color: 0x111111, transparent: true, opacity: 0.6 });
                const el = new THREE.LineSegments(eg, em);
                child.add(el);
                edgesMap.set(child.uuid, el);
                child.userData.progInfo = entry;
                interactiveMeshes.push(child);
            });
            scene.add(gltf.scene);
            loadedCount++;
            loadingBar.style.width = (loadedCount / MODELS.length * 100) + "%";
            resolve(gltf.scene);
        }, null, reject);
    });
}

Promise.all(MODELS.map(m => loadModel(m)))
    .then(scenes => {
        const box = new THREE.Box3();
        scenes.forEach(s => box.expandByObject(s));
        if (!box.isEmpty()) {
            const center = box.getCenter(new THREE.Vector3());
            const size   = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const dist   = maxDim * 1.8;
            // Point camera at datastacks (first model)
            const dsBox = new THREE.Box3().setFromObject(scenes[0]);
            const dsCenter = dsBox.getCenter(new THREE.Vector3());
            const dsSize = dsBox.getSize(new THREE.Vector3());
            const dsDim = Math.max(dsSize.x, dsSize.y, dsSize.z);
            camera.position.set(dsCenter.x + dsDim*1.5, dsCenter.y + dsDim*0.8, dsCenter.z + dsDim*1.5);
            controls.target.copy(dsCenter);
            controls.update();
            const gr = Math.max(size.x, size.z) * 0.75;
            plantTrees(center.x, center.z, gr*1.5, maxDim*0.06);
            sun.shadow.camera.left = sun.shadow.camera.bottom = -maxDim*1.5;
            sun.shadow.camera.right = sun.shadow.camera.top = maxDim*1.5;
            sun.shadow.camera.far = maxDim*4;
            sun.shadow.camera.updateProjectionMatrix();
            // Reposition and scale clouds relative to scene
            const cloudHeight = maxDim * 1.8;
            const spread = maxDim * 2.5;
            const cloudOffsets = [
                [-0.6, 0.0,  0.35],
                [ 0.4, 0.25,-0.55],
                [ 0.1,-0.05, 0.75],
                [-0.85,0.15,-0.2],
                [ 0.55,0.05, 0.15],
            ];
            clouds.forEach((c, i) => {
                const [ox, oy, oz] = cloudOffsets[i];
                const cs = maxDim * 0.09;
                c.scale.setScalar(cs);
                c.position.set(
                    center.x + ox * spread,
                    cloudHeight + oy * maxDim * 0.3,
                    center.z + oz * spread
                );
                c.userData.baseY = c.position.y;
            });
        }
        buildLegend();
        loadingBar.style.width = "100%";
        setTimeout(() => {
            document.getElementById("loading").classList.add("hidden");
            setTimeout(() => document.getElementById("loading").style.display="none", 700);
        }, 300);
    })
    .catch(err => { loadingLbl.textContent="Load error -- see console"; console.error(err); });

// =============================================================================
//  LEGEND
// =============================================================================
function buildLegend() {
    const legendEl = document.getElementById("legend");
    MODELS.filter(e => !e.contextOnly).forEach(entry => {
        const item = document.createElement("div"); item.className = "legend-item";
        const sw   = document.createElement("div"); sw.className = "legend-swatch";
        sw.style.background = "#" + new THREE.Color(entry.color).getHexString();
        const lb   = document.createElement("span"); lb.textContent = entry.name;
        item.appendChild(sw); item.appendChild(lb); legendEl.appendChild(item);
        item.addEventListener("click", () => {
            const ms = interactiveMeshes.filter(m => m.userData.progInfo === entry);
            if (!ms.length) return;
            const b = new THREE.Box3(); ms.forEach(m => b.expandByObject(m));
            controls.target.lerp(b.getCenter(new THREE.Vector3()), 0.6);
        });
    });
}

// =============================================================================
//  HOVER
// =============================================================================
const raycaster  = new THREE.Raycaster();
const mouse      = new THREE.Vector2(-9999,-9999);
let   hoveredInfo = null;  // the progInfo of the currently hovered file-group
const activeGroup = [];   // all meshes in the hovered file

const infoPanel  = document.getElementById("info-panel");
const panelName  = document.getElementById("panel-name");
const panelSub   = document.getElementById("panel-subtitle");
const panelDesc  = document.getElementById("panel-desc");
const hoverTag   = document.getElementById("hover-tag");

canvas.addEventListener("mousemove", e => {
    mouse.x = (e.clientX/window.innerWidth)*2-1;
    mouse.y = -(e.clientY/window.innerHeight)*2+1;
    hoverTag.style.left = (e.clientX+14)+"px";
    hoverTag.style.top  = (e.clientY-8)+"px";
});
canvas.addEventListener("mouseleave", clearHover);

function setGroupHighlight(info, on) {
    const opacity = on ? 1.0 : 0.6;
    const emissiveInt = on ? 0.1 : 0;
    interactiveMeshes.forEach(m => {
        if (m.userData.progInfo !== info) return;
        m.material.emissiveIntensity = emissiveInt;
        if (on) m.material.emissive.set(0x191400); else m.material.emissive.set(0x000000);
        const e = edgesMap.get(m.uuid); if (e) e.material.opacity = opacity;
    });
}

function clearHover() {
    if (hoveredInfo) { setGroupHighlight(hoveredInfo, false); hoveredInfo = null; }
    infoPanel.classList.remove("visible");
    hoverTag.classList.remove("visible");
    canvas.style.cursor = "default";
}

function updateHover() {
    if (!interactiveMeshes.length) return;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(interactiveMeshes, false);
    if (hits.length > 0) {
        const info = hits[0].object.userData.progInfo;
        if (info !== hoveredInfo) {
            if (hoveredInfo) setGroupHighlight(hoveredInfo, false);
            hoveredInfo = info;
            setGroupHighlight(info, true);
            panelName.textContent = info.name;
            panelSub.textContent  = info.subtitle;
            panelDesc.textContent = info.desc;
            infoPanel.classList.add("visible");
            hoverTag.textContent = info.name;
            hoverTag.classList.add("visible");
            canvas.style.cursor = "pointer";
        }
    } else { clearHover(); }
}

// =============================================================================
//  RENDER LOOP
// =============================================================================

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    stepClouds(performance.now());
    updateHover();
    renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
